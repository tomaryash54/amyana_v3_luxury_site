
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMYANA Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body{
 margin:0;
 font-family:'Inter',sans-serif;
 background:#faf8f5;
 color:#2c2c2c;
}
h1,h2,h3{font-family:'Playfair Display',serif;}
a{text-decoration:none;color:inherit;}
.container{max-width:1200px;margin:auto;padding:40px 20px;}
.grid{display:grid;gap:30px;}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
.hero{
 height:90vh;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 background:url('/images/footer4.jpg') center/cover no-repeat;
 color:white;
}
.hero h1{font-size:52px;}
.card img{width:100%;border-radius:10px;}
.card{transition:transform .3s;}
.card:hover{transform:translateY(-6px);}
.nav{
 display:flex;
 justify-content:space-between;
 padding:20px 40px;
 position:sticky;
 top:0;
 background:white;
}
footer{background:#ede7de;padding:40px;text-align:center;margin-top:60px;}
.footer-content{display:flex;justify-content:space-around;flex-wrap:wrap;}
.card-link{text-decoration:none;color:inherit;}
.whatsapp-float{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 8px rgba(0,0,0,0.3);z-index:1000;}
.whatsapp-float img{width:30px;}
.card{transition:transform .3s, box-shadow .3s;}
.card:hover{transform:translateY(-6px); box-shadow:0 8px 16px rgba(0,0,0,0.2);}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card{animation:fadeIn 0.5s ease-in-out;}
.instagram-carousel{position:relative;width:250px;height:250px;margin:auto;}
.carousel-image{width:100%;height:100%;object-fit:cover;border-radius:8px;transition:opacity 0.5s ease-in-out;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);color:white;border:none;padding:10px 12px;cursor:pointer;border-radius:4px;font-size:18px;z-index:10;}
.carousel-prev{left:10px;}
.carousel-next{right:10px;}
.carousel-btn:hover{background:rgba(0,0,0,0.8);}
.carousel-dots{display:flex;justify-content:center;gap:8px;margin-top:10px;}
.dot{width:10px;height:10px;border-radius:50%;background:#ccc;cursor:pointer;transition:background 0.3s;}
.dot.active{background:#6e5c4b;transform:scale(1.2);}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
