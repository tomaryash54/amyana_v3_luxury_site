<style>
body{
 margin:0;
 font-family:'Poppins',sans-serif;
 background:#ffffff;
 color:#2c2c2c;
}
h1,h2,h3{font-family:'Dancing Script',cursive;}
a{text-decoration:none;color:inherit;}
.container{max-width:1200px;margin:auto;padding:40px 20px;}
.grid{display:grid;gap:30px;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.hero{
 height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 background:url('/images/reiki-bg.jpg.png') center/cover no-repeat;
 color:white;
 position:relative;
 overflow:hidden;
}
.hero-overlay{
 position:absolute;
 top:0;
 left:0;
 right:0;
 bottom:0;
 background:linear-gradient(135deg,rgba(0,0,0,0.5) 0%,rgba(0,0,0,0.3) 50%,rgba(110,92,75,0.4) 100%);
 z-index:1;
}
.hero-content{
 position:relative;
 z-index:2;
 max-width:700px;
 padding:40px;
}
.hero h1{
 font-size:80px;
 font-weight:500;
 letter-spacing:2px;
 margin:0 0 24px 0;
 line-height:1.3;
 text-shadow:0 2px 20px rgba(0,0,0,0.3);
 word-spacing:-0.05em;
}
.hero p{
 font-size:20px;
 font-weight:300;
 letter-spacing:1.2px;
 margin:0;
 line-height:1.8;
 text-shadow:0 1px 10px rgba(0,0,0,0.2);
 opacity:0.95;
}
.offerings-section{
 padding:80px 20px;
}
.offerings-wrapper{
 display:block;
 width:100%;
}
.offerings-grid{
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:40px;
 margin-top:60px;
}
.offering-card{
 display:flex;
 flex-direction:column;
 text-decoration:none;
 color:inherit;
 cursor:pointer;
 transition:all 0.3s ease;
 height:100%;
}
.card-image-wrapper{
 position:relative;
 width:100%;
 aspect-ratio:1;
 overflow:hidden;
 background:#f5f1ec;
 margin-bottom:24px;
}
.card-image-wrapper img{
 width:100%;
 height:100%;
 object-fit:cover;
 transition:transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
 display:block;
}
.card-overlay{
 position:absolute;
 top:0;
 left:0;
 right:0;
 bottom:0;
 background:linear-gradient(135deg,rgba(110,92,75,0.3) 0%,rgba(110,92,75,0.1) 100%);
 opacity:0;
 transition:opacity 0.5s ease;
 z-index:1;
}
.offering-card:hover .card-image-wrapper img{
 transform:scale(1.08);
}
.offering-card:hover .card-overlay{
 opacity:1;
}
.offering-card:hover{
 transform:translateY(-8px);
}
.card-content{
 flex:1;
 display:flex;
 flex-direction:column;
 justify-content:flex-start;
}
.card-content h3{
 font-size:22px;
 font-weight:500;
 color:#2c2c2c;
 margin:0;
 letter-spacing:0.5px;
 line-height:1.4;
 transition:color 0.3s ease;
}
.offering-card:hover .card-content h3{
 color:#6e5c4b;
}
@media(max-width:1024px){
 .offerings-grid{
  grid-template-columns:repeat(2,1fr);
  gap:35px;
 }
}
@media(max-width:768px){
 .offerings-grid{
  grid-template-columns:1fr;
  gap:30px;
 }
 .offerings-section{
  padding:60px 20px;
 }
 .card-image-wrapper{
  margin-bottom:20px;
 }
 .card-content h3{
  font-size:20px;
 }
}
.card img{width:100%;border-radius:0;}
.card{transition:transform .3s, opacity .3s;position:relative;overflow:hidden;}
.card:hover{transform:scale(1.02);opacity:0.9;}
.card h3{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:white;margin:0;padding:20px;font-size:20px;font-weight:300;letter-spacing:1px;}
.nav{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:16px 50px;
 position:sticky;
 top:0;
 background:rgba(255,255,255,0.85);
 backdrop-filter:blur(12px);
 -webkit-backdrop-filter:blur(12px);
 border-bottom:1px solid rgba(110,92,75,0.1);
 z-index:100;
 transition:all 0.3s ease;
}
.nav-logo{
 font-size:20px;
 font-family:'Dancing Script',cursive;
 font-weight:500;
 letter-spacing:2px;
 color:#6e5c4b;
 text-decoration:none;
 cursor:pointer;
 transition:opacity 0.3s;
}
.nav-logo:hover{
 opacity:0.8;
}
.nav-menu{
 display:flex;
 gap:45px;
 align-items:center;
}
.nav-item{
 color:#2c2c2c;
 font-weight:400;
 font-size:14px;
 letter-spacing:0.5px;
 text-decoration:none;
 cursor:pointer;
 transition:all 0.3s;
 position:relative;
 padding-bottom:2px;
 border-bottom:2px solid transparent;
}
.nav-item:after{
 content:'';
 position:absolute;
 bottom:0;
 left:0;
 width:0;
 height:2px;
 background:#6e5c4b;
 transition:width 0.3s ease;
}
.nav-item:hover{
 color:#6e5c4b;
}
.nav-item:hover::after{
 width:100%;
}
.nav a{
 text-decoration:none;
 color:inherit;
}
.nav-dropdown{
 position:relative;
 cursor:pointer;
 z-index:101;
}
.nav-dropdown > span{
 display:inline-block;
}
.dropdown-content{
 position:absolute;
 top:calc(100% + 12px);
 left:0;
 background:rgba(255,255,255,0.95);
 backdrop-filter:blur(12px);
 -webkit-backdrop-filter:blur(12px);
 border-radius:12px;
 border:1px solid rgba(110,92,75,0.1);
 box-shadow:0 12px 40px rgba(0,0,0,0.12);
 padding:20px 0;
 min-width:220px;
 opacity:0;
 visibility:hidden;
 transform:translateY(-12px);
 transition:all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
 z-index:1000;
}
.nav-dropdown:hover .dropdown-content{
 opacity:1;
 visibility:visible;
 transform:translateY(0);
}
.dropdown-content.active{
 opacity:1;
 visibility:visible;
 transform:translateY(0);
}
.dropdown-content a{
 display:block;
 padding:14px 24px;
 color:#2c2c2c;
 font-size:13px;
 letter-spacing:0.5px;
 font-weight:400;
 text-decoration:none;
 transition:all 0.3s;
 border-left:3px solid transparent;
 margin:0 8px;
}
.dropdown-content a:hover{
 background:rgba(110,92,75,0.08);
 color:#6e5c4b;
 border-left-color:#6e5c4b;
 padding-left:28px;
}
.hamburger{
 display:none;
 flex-direction:column;
 gap:6px;
 background:none;
 border:none;
 cursor:pointer;
 padding:8px;
}
.hamburger span{
 width:25px;
 height:2px;
 background:#2c2c2c;
 transition:all 0.3s;
 border-radius:2px;
}
.hamburger.active span:nth-child(1){
 transform:rotate(45deg) translate(10px,10px);
}
.hamburger.active span:nth-child(2){
 opacity:0;
}
.hamburger.active span:nth-child(3){
 transform:rotate(-45deg) translate(7px,-7px);
}
@media(max-width:1024px){
 .nav{
  padding:16px 30px;
 }
 .nav-menu{
  gap:30px;
 }
}
@media(max-width:768px){
 .nav{
  padding:14px 20px;
 }
 .nav-logo{
  font-size:18px;
 }
 .hamburger{
  display:flex;
 }
 .nav-menu{
  position:fixed;
  top:60px;
  left:0;
  right:0;
  flex-direction:column;
  gap:0;
  background:rgba(255,255,255,0.98);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  padding:20px 0;
  max-height:calc(100vh - 60px);
  overflow-y:scroll;
  overflow-x:hidden;
  opacity:0;
  visibility:hidden;
  transition:all 0.3s ease;
  border-bottom:1px solid rgba(110,92,75,0.1);
  pointer-events:none;
  z-index:99;
 }
 .nav-menu.active{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
 }
 .nav-item{
  padding:16px 20px;
  border-bottom:none;
  border-left:3px solid transparent;
  font-size:16px;
  letter-spacing:0;
 }
 .nav-item::after{
  display:none;
 }
 .nav-item:hover{
  background:rgba(110,92,75,0.06);
  border-left-color:#6e5c4b;
 }
 .nav-dropdown{
  position:relative;
  width:100%;
  cursor:pointer;
 }
 .nav-dropdown .nav-item{
  width:100%;
  display:block;
 }
 .dropdown-content{
  position:relative;
  opacity:0;
  visibility:hidden;
  max-height:0;
  overflow:hidden;
  transform:none;
  background:rgba(110,92,75,0.04);
  box-shadow:none;
  border:none;
  border-radius:0;
  padding:0;
  margin:0;
  transition:all 0.2s ease;
 }
 .nav-dropdown:hover .dropdown-content{
  opacity:0;
  visibility:hidden;
 }
 .dropdown-content.active{
  opacity:1;
  visibility:visible;
  max-height:300px;
  overflow-y:auto;
 }
 .dropdown-content a{
  padding:12px 20px 12px 40px;
  border-left:none;
  margin:0;
  font-size:14px;
  display:block;
  color:#2c2c2c;
  text-decoration:none;
  transition:background 0.2s ease;
 }
}

.hero-section h2{font-size:40px;margin-top:0;}
.support-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px;margin:30px 0;}
.support-item{padding:30px;background:white;border-radius:10px;border-left:4px solid #6e5c4b;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:all 0.4s;}
.support-item:hover{transform:translateY(-8px);box-shadow:0 12px 28px rgba(0,0,0,0.15);}
.support-item h4{color:#6e5c4b;margin-top:0;font-size:16px;font-weight:600;letter-spacing:0.5px;}
.support-item p{color:#666;font-size:14px;line-height:1.7;margin:10px 0;}
.closing-text{font-style:italic;color:#666;line-height:1.8;margin:20px 0;border-left:3px solid #6e5c4b;padding-left:20px;}
.who-section .btn-primary{display:inline-block;margin-top:20px;}
.how-it-works{background:linear-gradient(180deg,#faf8f5 0%,#f5f1ec 100%);padding:80px 0;margin:60px 0;position:relative;overflow:hidden;}
.how-it-works > .container{max-width:1200px;margin:auto;padding:0 20px;}
.how-it-works h2{text-align:center;font-size:42px;color:#2c2c2c;margin-bottom:60px;letter-spacing:-1px;position:relative;padding-bottom:20px;}
.how-it-works h2::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:3px;background:linear-gradient(90deg,#6e5c4b,#5a4a3a);border-radius:2px;}
.steps-container{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;position:relative;align-items:start;}
.step{text-align:center;padding:30px 20px;position:relative;}
.step-number{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#6e5c4b 0%,#5a4a3a 100%);color:white;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 4px 12px rgba(110,92,75,0.2);transition:transform 0.3s;}
.step:hover .step-number{transform:scale(1.1);}
.step h3{color:#6e5c4b;font-size:18px;font-weight:600;margin:15px 0;letter-spacing:0.5px;}
.step p{color:#666;font-size:14px;line-height:1.7;margin:0;}
.step-connector{position:absolute;top:30px;width:calc(100% + 20px);height:2px;background:linear-gradient(90deg,transparent,#6e5c4b,transparent);left:-10px;display:none;}
.step:not(:last-child) .step-connector{display:block;}
@media(max-width:1024px){.steps-container{grid-template-columns:repeat(2,1fr);gap:30px;}.step-connector{display:none !important;}.grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){.steps-container{grid-template-columns:1fr;gap:20px;}.how-it-works h2{font-size:28px;margin-bottom:40px;}.step{padding:20px 15px;}.step-number{width:50px;height:50px;font-size:20px;}.grid-3{grid-template-columns:1fr;}}.who-section .btn-primary{display:inline-block;margin-top:20px;}
.gift-cards-page{padding:40px 20px;}
.gift-intro{text-align:center;margin-bottom:60px;}
.gift-intro h1{font-size:42px;margin-bottom:20px;}
.gift-intro p{color:#666;line-height:1.8;font-size:16px;margin:15px auto;max-width:700px;}
.gift-intro strong{color:#6e5c4b;font-weight:600;}
.subtext{color:#999;font-style:italic;font-size:15px;}
.gift-cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:40px;margin:60px 0;}
.flip-card{background-color:transparent;width:100%;height:400px;perspective:1000px;cursor:pointer;}
.flip-card-inner{position:relative;width:100%;height:100%;text-align:center;transition:transform 0.6s;transform-style:preserve-3d;}
.flip-card.flipped .flip-card-inner{transform:rotateY(180deg);}
.flip-card-front,.flip-card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;}
.flip-card-front{background:white;color:black;box-shadow:0 8px 20px rgba(0,0,0,0.1);padding:0;overflow:hidden;}
.flip-card-front img{width:100%;height:60%;object-fit:cover;border-radius:12px 12px 0 0;}
.flip-card-front h3{color:#6e5c4b;font-size:20px;font-weight:600;margin:15px 0 10px 0;}
.flip-card-front .click-text{color:#999;font-size:12px;font-style:italic;margin:0;}
.flip-card-back{background:linear-gradient(135deg,#f9f5f0 0%,#f0e8e0 100%);color:#2c2c2c;transform:rotateY(180deg);padding:25px;overflow-y:auto;display:flex;flex-direction:column;}
.flip-card-back h3{color:#6e5c4b;font-size:18px;font-weight:600;margin:0 0 12px 0;}
.flip-card-back .tagline{color:#6e5c4b;font-weight:500;margin:8px 0;font-style:italic;font-size:14px;}
.flip-card-back p{color:#666;font-size:13px;line-height:1.6;margin:8px 0;}
.flip-card-back h4{color:#6e5c4b;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin:15px 0 8px 0;}
.flip-card-back ul{list-style-position:inside;color:#666;font-size:13px;padding:0;margin:5px 0 15px 0;}
.flip-card-back ul li{margin:4px 0;transition:all 0.3s;}
.flip-card-back ul li:before{content:'◆ ';color:#6e5c4b;margin-right:6px;font-weight:500;}
.flip-card-back .btn-primary{align-self:center;margin-top:auto;padding:12px 24px;font-size:13px;}
@media(max-width:1024px){.gift-cards-grid{grid-template-columns:repeat(2,1fr);gap:30px;}.grid-container{grid-template-columns:repeat(2,1fr);gap:10px;}}
@media(max-width:768px){.flip-card{height:350px;}.gift-cards-grid{grid-template-columns:1fr;}.gift-intro h1{font-size:32px;}.flip-card-back{padding:20px;font-size:12px;}.flip-card-back h4{font-size:12px;}.footer-top{flex-direction:column;padding:30px;}.footer-section{min-width:100%;padding:20px 0;border-bottom:1px solid rgba(110,92,75,0.1);}.footer-instagram{padding:20px;}.grid-container{grid-template-columns:repeat(2,1fr);gap:8px;}}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none !important;transition:none !important;scroll-behavior:auto !important;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
