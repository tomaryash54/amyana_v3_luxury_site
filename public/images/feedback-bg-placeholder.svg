<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Feedback Background Placeholder</title>
  <desc id="desc">Replace this file with your feedback section background image.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6e5c4b"/>
      <stop offset="55%" stop-color="#8d7764"/>
      <stop offset="100%" stop-color="#b39f8d"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g fill="#ffffff" fill-opacity="0.88" font-family="Poppins, Arial, sans-serif" text-anchor="middle">
    <text x="800" y="450" font-size="48" font-weight="600">Feedback Background Placeholder</text>
    <text x="800" y="510" font-size="28" font-weight="400">Replace file:</text>
    <text x="800" y="555" font-size="30" font-weight="600">public/images/feedback-bg-placeholder.svg</text>
  </g>
</svg>
